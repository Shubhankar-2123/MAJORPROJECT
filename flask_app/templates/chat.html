<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignAI Conversations</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { background: linear-gradient(180deg, #F5F7FA 0%, #FFFFFF 100%); }
        .conversation-item {
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            color: #6B7280;
        }
        .conversation-item:hover {
            background-color: #F5F7FA;
            color: #3B82F6;
        }
        .conversation-item.active {
            background-color: #DBEAFE;
            color: #3B82F6;
            font-weight: 600;
        }
        .chat-message {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease-out;
        }
        .chat-message.user {
            justify-content: flex-end;
        }
        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
        }
        .message-bubble.bot {
            background-color: #F5F7FA;
            color: #1F2937;
            border: 1px solid #E5E7EB;
        }
        .message-bubble.user {
            background-color: #3B82F6;
            color: white;
        }
    </style>
</head>
<body>
    <div style="display: flex; height: 100vh;">
        <!-- Sidebar -->
        <aside style="width: 320px; background-color: white; border-right: 1px solid #E5E7EB; display: flex; flex-direction: column; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);">
            <div style="padding: 20px 24px; border-bottom: 1px solid #E5E7EB;">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
                    <div style="width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, #3B82F6, #2563EB); color: white; display: flex; align-items: center; justify-content: center;">🤟</div>
                    <div>
                        <div style="font-weight: 600; font-size: 18px; color: #1F2937;">Conversations</div>
                        <div style="font-size: 12px; color: #9CA3AF;">Resume any chat anytime</div>
                    </div>
                </div>
                <button id="new-chat-btn" class="btn btn-primary" style="width: 100%;">
                    <i class="fa-solid fa-plus" style="margin-right: 8px;"></i>New Chat
                </button>
            </div>
            <div id="conversation-list" style="flex: 1; overflow-y: auto; padding: 16px; display: grid; gap: 8px;"></div>
        </aside>

        <!-- Main Chat Area -->
        <main style="flex: 1; display: flex; flex-direction: column;">
            <!-- Header -->
            <header style="background-color: white; border-bottom: 1px solid #E5E7EB; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div style="width: 40px; height: 40px; border-radius: 8px; background-color: #F5F7FA; color: #6B7280; display: flex; align-items: center; justify-content: center; font-size: 18px;">
                        <i class="fa-solid fa-comments"></i>
                    </div>
                    <div>
                        <div id="active-title" style="font-weight: 600; font-size: 16px; color: #1F2937;">Select a chat</div>
                        <div id="active-meta" style="font-size: 12px; color: #9CA3AF;">Messages will appear here</div>
                    </div>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <button id="delete-chat-btn" class="btn btn-danger btn-sm" style="display: none;">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                    <a href="/customize" class="btn btn-primary btn-sm">
                        <i class="fa-solid fa-video" style="margin-right: 6px;"></i>Custom Signs
                    </a>
                    <a href="/app" class="btn btn-secondary btn-sm">
                        <i class="fa-solid fa-house" style="margin-right: 6px;"></i>Back to App
                    </a>
                    <button id="logout-btn" class="btn btn-danger btn-sm">
                        <i class="fa-solid fa-right-from-bracket" style="margin-right: 6px;"></i>Logout
                    </button>
                </div>
            </header>

            <!-- Messages Area -->
            <section id="chat-messages" style="flex: 1; overflow-y: auto; padding: 24px; background-color: #F5F7FA;"></section>

            <!-- Input Area -->
            <footer style="background-color: white; border-top: 1px solid #E5E7EB; padding: 16px 24px;">
                <form id="chat-form" style="display: flex; align-items: center; gap: 12px;">
                    <input id="chat-input" type="text" class="form-control" placeholder="Type your message..." style="flex: 1; margin-bottom: 0;" />
                    <button id="send-btn" type="submit" class="btn btn-primary btn-sm" style="padding: 12px 20px;">
                        <i class="fa-solid fa-paper-plane" style="margin-right: 6px;"></i>Send
                    </button>
                </form>
            </footer>
        </main>
    </div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
